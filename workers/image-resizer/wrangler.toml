name = "tobira-image-resizer"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

account_id = "349d1bc326ebd8f64abfe827fa61ade4"
workers_dev = false

routes = [
  { pattern = "media.tobira.app/*", zone_name = "tobira.app" }
]

[[r2_buckets]]
binding = "BOOKMARKS"
bucket_name = "bookmarks"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
